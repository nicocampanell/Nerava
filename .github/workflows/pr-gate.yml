name: PR Gate

on:
  pull_request:
    branches: [main, master]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - run: pip install ruff
      - name: Ruff check
        run: ruff check backend/app/

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.9" }
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov freezegun
      - name: Run tests
        working-directory: backend
        run: pytest tests/ -x -q --ignore=tests/integration --ignore=tests/test_queued_orders.py --ignore=tests/test_twilio_sms_webhook.py -k "not test_ev_connect and not test_domain_hub and not test_demo_runner"

  driver-lint-build:
    name: Driver Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/driver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/driver/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check + Build
        run: npm run build

  driver-tests:
    name: Driver Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/driver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/driver/package-lock.json
      - run: npm ci
      - name: Run unit tests
        run: npx vitest run

  merchant-lint-build:
    name: Merchant Lint + Build
    runs-on: ubuntu-latest
    if: github.event.pull_request && (contains(github.event.pull_request.changed_files || '', 'apps/merchant') || true)
    defaults:
      run:
        working-directory: apps/merchant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/merchant/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  admin-lint-build:
    name: Admin Lint + Build
    runs-on: ubuntu-latest
    if: github.event.pull_request && (contains(github.event.pull_request.changed_files || '', 'apps/admin') || true)
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  console-lint-build:
    name: Console Lint + Build
    runs-on: ubuntu-latest
    if: github.event.pull_request && (contains(github.event.pull_request.changed_files || '', 'apps/console') || true)
    defaults:
      run:
        working-directory: apps/console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  # Single gate check — require this in branch protection rules
  pr-gate:
    name: PR Gate
    needs: [backend-lint, backend-tests, driver-lint-build, driver-tests, merchant-lint-build, admin-lint-build, console-lint-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.backend-tests.result }}" != "success" ]] || \
             [[ "${{ needs.driver-lint-build.result }}" != "success" ]] || \
             [[ "${{ needs.driver-tests.result }}" != "success" ]] || \
             [[ "${{ needs.merchant-lint-build.result }}" != "success" ]] || \
             [[ "${{ needs.admin-lint-build.result }}" != "success" ]] || \
             [[ "${{ needs.console-lint-build.result }}" != "success" ]]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All checks passed"
