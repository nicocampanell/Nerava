name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov freezegun ruff
      - name: Run ruff check
        run: ruff check backend/app/
      - name: Run tests
        working-directory: backend
        run: pytest tests/test_session_event_service.py tests/test_campaign_service.py tests/test_security_headers.py tests/test_partner_api.py -q
  driver:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/driver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/driver/package-lock.json
      - run: npm ci || npm install
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
