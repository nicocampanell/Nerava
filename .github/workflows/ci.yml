name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov freezegun ruff
      - name: Run ruff check
        run: ruff check backend/app/
      - name: Run tests
        working-directory: backend
        run: pytest tests/ -x -q --ignore=tests/integration --ignore=tests/test_queued_orders.py --ignore=tests/test_twilio_sms_webhook.py --ignore=tests/test_exclusive_sessions.py -k "not test_ev_connect and not test_domain_hub and not test_demo_runner"
  driver:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/driver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/driver/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
