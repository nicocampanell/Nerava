[tool.black]
line-length = 100
target-version = ["py39"]

[tool.ruff]
line-length = 100
# Production runtime is Python 3.9 — PEP 604 union syntax (X | None) and
# lowercase generic subscripts (dict[str, Any]) are evaluation errors on 3.9
# without `from __future__ import annotations`. Keep target aligned with prod.
target-version = "py39"
select = ["E","F","I","UP","B","SIM","C4"]
# UP006/UP007/UP035 would auto-rewrite Optional[X] / Dict[...] into 3.10+
# syntax that crashes production. B008 is the standard FastAPI Depends(...)
# default pattern used across every router in the repo. SIM105/SIM108 are
# pre-existing stylistic patterns we don't want auto-rewritten in unrelated
# files on every commit.
ignore = ["E203","E266","E501","UP006","UP007","UP035","B008","SIM105","SIM108"]

[tool.mypy]
python_version = "3.9"
strict = false
warn_unused_configs = true
ignore_missing_imports = true
